# config.yaml — infrastructure settings
# Qdrant URL, Docker settings, logging, cost limits, etc. Generally not touched.
# Project settings (models, intent) are edited in telos.yaml.

memory:
  qdrant_url: http://localhost:6333

sandbox:
  image: telos-sandbox:latest
  container_name: telos-agent-sandbox
  use_docker: true
  memory_limit: 1024m
  timeout: 300

logging:
  level: INFO

daily_loop_limit: 1000
monthly_cost_limit: 20.0
