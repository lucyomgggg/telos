llm:
  model: gemini/gemini-flash-latest
  producer_model: deepseek/deepseek-chat
  goal_gen_model: deepseek/deepseek-chat
  max_tokens_per_loop: 500000
memory:
  qdrant_url: http://localhost:6333
  collection_name: telos_artifacts
  embedding_model: all-MiniLM-L6-v2
  embedding_dimensions: 384
  workspace_path: /Users/tomcruise/telos/projects/default/workspace
  persistent_workspace_name: persistent
sandbox:
  image: telos-sandbox:latest
  container_name: telos-agent-sandbox
  use_docker: true
  memory_limit: 1024m
  timeout: 60
logging:
  level: INFO
initial_intent: "Describe what you want the AI to build or explore."
history_limit: 10
similar_artifacts_limit: 2
max_lessons: 2
daily_loop_limit: 1000
monthly_cost_limit: 20.0
rate_limit_delay: 0.5
deduplication_threshold: 0.85
max_steps: 15
consecutive_error_limit: 3
max_output_truncation: 8000
model_cost_overrides:
  deepseek/deepseek-chat-v3:
    input_cost_per_million: 0.27
    output_cost_per_million: 1.1
  anthropic/claude-4.6-sonnet-20260217:
    input_cost_per_million: 3.0
    output_cost_per_million: 15.0
